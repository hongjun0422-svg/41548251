<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f0fdfa" />
    <meta name="color-scheme" content="light dark" />
    <title>나의 복용 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-pattern" aria-hidden="true"></div>

    <div class="dashboard" id="dashboard">
      <header class="dash-header card">
        <div class="dash-header__brand">
          <span class="dash-header__logo" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M12 2a3 3 0 0 1 3 3v2h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2V5a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
              <path d="M9 14l2 2 4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <div>
            <p class="eyebrow">PillCare Dashboard</p>
            <h1>나의 복용 관리</h1>
          </div>
        </div>

        <nav class="view-tabs" role="tablist" aria-label="화면 전환">
          <button type="button" class="view-tab view-tab--active" role="tab" id="tab-home" data-view="home" aria-selected="true" aria-controls="view-home">복용 관리</button>
          <button type="button" class="view-tab" role="tab" id="tab-ai" data-view="ai" aria-selected="false" aria-controls="view-ai">AI 복용</button>
          <button type="button" class="view-tab" role="tab" id="tab-manage" data-view="manage" aria-selected="false" aria-controls="view-manage">영양제 등록</button>
        </nav>

        <p id="dash-header-sub" class="dash-header__sub">오늘 복용 · 월간 캘린더</p>
        <div class="dash-header__actions">
          <p id="daily-date" class="dash-header__date"></p>
          <button type="button" id="theme-toggle" class="theme-toggle" aria-label="다크 모드로 전환">
            <span class="theme-toggle__icon" aria-hidden="true">
              <svg class="theme-ico theme-ico--sun" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.75"/>
              </svg>
              <svg class="theme-ico theme-ico--moon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M21 13.2A8.2 8.2 0 0 1 10.8 3a7.2 7.2 0 1 0 10.2 10.2Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
        </div>
      </header>

      <div class="dash-views">
        <!-- 복용 관리 탭 -->
        <div id="view-home" class="dash-view dash-view--home dash-view--active" role="tabpanel" aria-labelledby="tab-home">
          <aside class="dash-col dash-col--left">
            <section class="panel card panel--grow">
              <div class="panel__head">
                <h2 class="panel__title">오늘의 복용</h2>
                <p class="panel__desc">미복용 선택 → AI 복용 · 완료 선택 → 기록 삭제</p>
              </div>
              <div id="daily-list" class="daily-list daily-list--flat panel__body"></div>
            </section>

            <section class="panel card panel--notify" aria-labelledby="notify-settings-title">
              <div class="panel__head panel__head--compact">
                <h2 id="notify-settings-title" class="panel__title">알림</h2>
              </div>
              <div class="notify-compact panel__body">
                <label class="notify-toggle"><input type="checkbox" id="notify-enabled" /><span>사용</span></label>
                <label class="notify-toggle"><input type="checkbox" id="notify-intake" /><span>복용 시간</span></label>
                <label class="notify-toggle"><input type="checkbox" id="notify-missed" /><span>미복용</span></label>
                <label class="field field--inline">
                  <span class="field__label">판정(분)</span>
                  <input id="notify-delay" class="field__control" type="number" min="5" max="180" step="5" value="30" />
                </label>
                <button type="button" id="btn-notify-permission" class="btn btn-ghost btn-sm">권한</button>
                <p id="notify-status" class="form-msg form-msg--tiny" aria-live="polite"></p>
              </div>
            </section>
          </aside>

          <aside class="dash-col dash-col--right dash-col--calendar-only">
            <section class="panel card panel--calendar panel--grow">
              <div class="panel__head panel__head--row">
                <h2 class="panel__title" id="month-label"></h2>
                <div class="cal-nav">
                  <button type="button" id="btn-prev" class="btn btn-circle btn-sm" aria-label="이전 달">‹</button>
                  <button type="button" id="btn-today" class="btn btn-ghost btn-sm">오늘</button>
                  <button type="button" id="btn-next" class="btn btn-circle btn-sm" aria-label="다음 달">›</button>
                </div>
              </div>
              <div class="calendar-fill panel__body">
                <div class="weekdays" id="weekdays"></div>
                <div class="grid grid--dash grid--fill" id="calendar-grid" role="grid"></div>
                <div class="hint hint--inline">
                  <span class="hint__tag hint__tag--ok">완료</span>
                  <span class="hint__tag hint__tag--miss">미복용</span>
                  <span class="hint__tag hint__tag--none">없음</span>
                </div>
              </div>
            </section>
          </aside>
        </div>

        <!-- 영양제 등록 탭 -->
        <div id="view-manage" class="dash-view dash-view--manage" role="tabpanel" aria-labelledby="tab-manage" hidden>
          <section class="panel card panel--manage-form">
            <div class="panel__head">
              <h2 class="panel__title">영양제 등록</h2>
              <p class="panel__desc">이름 · 복용량 · 시간 · 성분</p>
            </div>
            <form id="vitamin-form" class="form form--manage panel__body" autocomplete="off">
              <div class="form-grid form-grid--manage">
                <label class="field">
                  <span class="field__label">이름</span>
                  <input id="v-name" name="name" class="field__control" type="text" placeholder="종합비타민" required />
                </label>
                <label class="field">
                  <span class="field__label">복용량</span>
                  <input id="v-dosage" name="dosage" class="field__control" type="text" placeholder="1정" required />
                </label>
                <label class="field">
                  <span class="field__label">복용 시간</span>
                  <input id="v-times" name="times" class="field__control" type="text" placeholder="08:00, 21:00" required />
                </label>
                <label class="field field--full">
                  <span class="field__label">성분</span>
                  <textarea id="v-ingredients" name="ingredients" class="field__control field__control--textarea" rows="3" placeholder="비타민 C, D…" required></textarea>
                </label>
              </div>
              <button type="submit" class="btn btn-primary btn-block">등록</button>
              <p id="form-msg" class="form-msg form-msg--tiny" aria-live="polite"></p>
            </form>
          </section>

          <section class="panel card panel--manage-list panel--grow">
            <div class="panel__head panel__head--row">
              <h2 class="panel__title">등록 목록</h2>
              <p class="panel__desc panel__desc--inline" id="vitamin-count"></p>
            </div>
            <div id="vitamin-registry" class="registry registry--manage panel__body"></div>
          </section>
        </div>

        <!-- AI 복용 탭 -->
        <div id="view-ai" class="dash-view dash-view--ai" role="tabpanel" aria-labelledby="tab-ai" hidden>
          <main class="dash-col dash-col--ai">
            <section class="panel card panel--ai panel--grow" aria-labelledby="dispense-title">
              <div class="panel__head">
                <h2 id="dispense-title" class="panel__title">AI 복용 확인</h2>
                <p class="panel__desc">배출 → 카메라 → 꿀꺽 감지 → 기록</p>
              </div>

              <div class="ai-layout ai-layout--tab">
                <div class="ai-layout__controls">
                  <div class="ai-layout__controls-main">
                    <input type="hidden" id="dispense-slot" value="" />
                    <div id="dispense-slot-display" class="dispense-selected" aria-live="polite">
                      <p class="dispense-selected__empty">「오늘의 복용」에서 항목을 선택하세요.</p>
                    </div>
                    <label class="field">
                      <span class="field__label">라즈베리파이 (고정)</span>
                      <input id="dispense-pi-url" class="field__control field__control--readonly" type="url" value="https://91eefcc5394e14.lhr.life" readonly />
                    </label>
                    <p id="dispense-pi-status" class="form-msg form-msg--tiny" aria-live="polite"></p>
                    <div class="dispense__actions">
                      <button type="button" id="btn-dispense-start" class="btn btn-primary btn-block" disabled>시작</button>
                      <button type="button" id="btn-dispense-stop" class="btn btn-ghost btn-block" hidden>중지</button>
                      <button type="button" id="btn-dispense-test" class="btn btn-ghost btn-sm btn-block">🧪 AI 테스트 (기록 없음)</button>
                    </div>
                    <ol class="dispense__steps dispense__steps--compact">
                      <li id="step-dispense" class="dispense-step">① 배출</li>
                      <li id="step-camera" class="dispense-step">② 카메라</li>
                      <li id="step-detect" class="dispense-step">③ AI</li>
                      <li id="step-done" class="dispense-step">④ 저장</li>
                    </ol>
                  </div>

                  <section class="ai-summary-slot" id="today-summary" aria-live="polite"></section>
                </div>

                <div class="ai-layout__stage">
                  <div id="dispense-canvas-host" class="dispense__canvas-host" aria-label="카메라"></div>
                  <div class="dispense__overlay">
                    <p id="dispense-status" class="dispense__status" aria-live="polite">대기 중</p>
                    <p id="dispense-labels" class="dispense__labels"></p>
                    <p id="dispense-confidence" class="dispense__confidence"></p>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>

    <div id="confirm-root" class="confirm-root" hidden aria-hidden="true">
      <div class="confirm-backdrop" data-confirm-dismiss></div>
      <div class="confirm-box" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
        <p id="confirm-title" class="confirm-box__title">복용 기록 삭제</p>
        <p id="confirm-message" class="confirm-box__body"></p>
        <div class="confirm-box__actions">
          <button type="button" id="confirm-no" class="btn btn-ghost btn-sm">아니요</button>
          <button type="button" id="confirm-yes" class="btn btn-primary btn-sm">예</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>
    <script src="dispense.js"></script>
    <script src="script.js"></script>
  </body>
</html>
