<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f0fdfa" />
    <meta name="color-scheme" content="light dark" />
    <title>가족 비타민 캘린더 (연습)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-pattern" aria-hidden="true"></div>

    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__logo" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="4" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.75" />
              <path d="M8 2v4M16 2v4M3 10h18" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
              <path d="M9 15l2 2 4-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <div>
            <p class="eyebrow">Vitamin routine</p>
            <h1>복용 캘린더</h1>
          </div>

          <button
            type="button"
            id="theme-toggle"
            class="theme-toggle"
            aria-label="다크 모드로 전환"
            title="테마 전환"
          >
            <span class="theme-toggle__icon" aria-hidden="true">
              <svg class="theme-ico theme-ico--sun" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.75"/>
              </svg>
              <svg class="theme-ico theme-ico--moon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M21 13.2A8.2 8.2 0 0 1 10.8 3a7.2 7.2 0 1 0 10.2 10.2Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="theme-toggle__text">테마</span>
          </button>
        </div>
        <p class="sub">오늘 복용과 지난 기록을 나누어 볼 수 있습니다.</p>
      </header>

      <div class="views tab-daily" id="views">
        <div class="view-tabs" role="tablist" aria-label="화면 전환">
          <button
            type="button"
            class="view-tab view-tab--active"
            id="tab-daily"
            role="tab"
            aria-selected="true"
            aria-controls="panel-daily"
            data-view="daily"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.75" />
              <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
            오늘 요약
          </button>
          <button
            type="button"
            class="view-tab"
            id="tab-calendar"
            role="tab"
            aria-selected="false"
            aria-controls="panel-calendar"
            data-view="calendar"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.75" />
              <path d="M8 3v4M16 3v4M3 11h18" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
            캘린더
          </button>
          <button
            type="button"
            class="view-tab"
            id="tab-manage"
            role="tab"
            aria-selected="false"
            aria-controls="panel-manage"
            data-view="manage"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 2v4M12 18v4M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
              />
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.75" />
            </svg>
            비타민 등록
          </button>
        </div>

        <!-- 일간: 오늘 복용 + 비타민 정보 -->
        <section
          class="view-panel view-panel--daily"
          id="panel-daily"
          role="tabpanel"
          aria-labelledby="tab-daily"
        >
          <div class="daily-hero card">
            <p id="daily-date" class="daily-hero__date"></p>
            <h2 class="daily-hero__title">오늘의 복용</h2>
            <div id="daily-list" class="daily-list"></div>
          </div>

          <section class="vitamin-panel card" aria-labelledby="vitamin-panel-title">
            <div class="vitamin-panel__head">
              <span class="vitamin-panel__icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                  />
                  <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.75" />
                </svg>
              </span>
              <h2 id="vitamin-panel-title" class="vitamin-panel__title">구성원별 복용 비타민</h2>
            </div>
            <p class="vitamin-panel__desc">각 가족이 챙겨 먹는 영양제·비타민 종류입니다.</p>
            <div id="vitamin-list" class="vitamin-list"></div>
          </section>

          <footer class="hint hint--daily">
            <div class="hint__item hint__item--ok">
              <span class="hint__ico" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </span>
              <span>복용 완료</span>
            </div>
            <div class="hint__item hint__item--miss">
              <span class="hint__ico" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                </svg>
              </span>
              <span>미복용</span>
            </div>
            <div class="hint__item hint__item--none">
              <span class="hint__ico" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.75" stroke-dasharray="4 3" />
                </svg>
              </span>
              <span>기록 없음</span>
            </div>
          </footer>
        </section>

        <!-- 캘린더: 월 이동 + 범례 + 그리드 -->
        <section
          class="view-panel view-panel--calendar"
          id="panel-calendar"
          role="tabpanel"
          aria-labelledby="tab-calendar"
        >
          <section class="toolbar card" aria-label="월 이동">
            <button type="button" id="btn-prev" class="btn btn-circle" aria-label="이전 달">
              <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <div class="toolbar__month">
              <span class="toolbar__month-icon" aria-hidden="true">
                <svg class="ico ico--muted" width="20" height="20" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.75" />
                  <path d="M8 3v4M16 3v4M3 11h18" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
                </svg>
              </span>
              <h2 id="month-label" class="month-label"></h2>
            </div>
            <button type="button" id="btn-next" class="btn btn-circle" aria-label="다음 달">
              <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <button type="button" id="btn-today" class="btn btn-primary btn-today">
              <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.75" />
                <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>이번 달 오늘</span>
            </button>
          </section>

          <section class="legend card" aria-label="구성원 범례">
            <div class="legend__head">
              <svg class="ico ico--accent" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
                <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.75" />
                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
              </svg>
              <span class="legend-title">구성원</span>
            </div>
            <ul id="legend-list" class="legend-list"></ul>
          </section>

          <p class="calendar-note">오늘 이후 날짜는 아직 기록이 없습니다.</p>

          <div class="calendar-wrap card card--flush">
            <div class="calendar-scroll">
              <div class="calendar-sheet">
                <div class="weekdays" id="weekdays"></div>
                <div class="grid" id="calendar-grid" role="grid" aria-label="월간 캘린더"></div>
              </div>
            </div>
          </div>

          <footer class="hint">
            <div class="hint__item hint__item--ok">
              <span class="hint__ico" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </span>
              <span>복용 완료</span>
            </div>
            <div class="hint__item hint__item--miss">
              <span class="hint__ico" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                </svg>
              </span>
              <span>미복용</span>
            </div>
            <div class="hint__item hint__item--none">
              <span class="hint__ico" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.75" stroke-dasharray="4 3" />
                </svg>
              </span>
              <span>기록 없음</span>
            </div>
          </footer>
        </section>

        <!-- 비타민 등록: 사용자가 직접 입력 -->
        <section
          class="view-panel view-panel--manage"
          id="panel-manage"
          role="tabpanel"
          aria-labelledby="tab-manage"
        >
          <section class="manage card">
            <div class="manage__head">
              <h2 class="manage__title">비타민 등록</h2>
              <p class="manage__desc">이름/성분/복용자/복용량을 입력해 등록하세요.</p>
            </div>

            <form id="vitamin-form" class="form" autocomplete="off">
              <div class="form-row">
                <label class="field">
                  <span class="field__label">비타민 이름</span>
                  <input id="v-name" name="name" class="field__control" type="text" placeholder="예: 오메가3" required />
                </label>
                <label class="field">
                  <span class="field__label">복용량</span>
                  <input id="v-dosage" name="dosage" class="field__control" type="text" placeholder="예: 1캡슐" required />
                </label>
              </div>

              <label class="field">
                <span class="field__label">성분</span>
                <textarea
                  id="v-ingredients"
                  name="ingredients"
                  class="field__control field__control--textarea"
                  rows="3"
                  placeholder="예: EPA/DHA 1000mg, 비타민E 등"
                  required
                ></textarea>
              </label>

              <div class="form-row">
                <label class="field">
                  <span class="field__label">복용할 사용자</span>
                  <select id="v-member" name="memberId" class="field__control" required></select>
                </label>
                <button type="submit" class="btn btn-primary form-submit">
                  <span>등록</span>
                </button>
              </div>

              <p id="form-msg" class="form-msg" aria-live="polite"></p>
            </form>
          </section>

          <section class="manage card manage-list">
            <div class="manage__head">
              <h2 class="manage__title">등록된 비타민</h2>
              <p class="manage__desc">삭제도 가능합니다.</p>
            </div>
            <div id="vitamin-registry" class="registry"></div>
          </section>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
